<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trainings Log</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --bg: #f7f7f5;
    --bg-elevated: #ffffff;
    --bg-card: #ffffff;
    --border: #e4e4e0;
    --text: #111111;
    --text-dim: #666666;
    --text-mute: #b8b8b8;
    --accent: #4a8f00;
    --accent-dim: #3a7000;
    --warn: #d9520e;
    --success: #15803d;
    --rest: #6b7280;
    --gym: #4a8f00;
    --run: #1d6feb;
    --long: #c07a00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Helvetica Neue', 'Arial', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    padding: 24px 16px;
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 920px; margin: 0 auto; }

  /* Header */
  .header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
    margin-bottom: 24px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 16px;
  }
  .header h1 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .header h1 span { color: var(--accent); }
  .header-meta {
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 11px;
    color: var(--text-mute);
    letter-spacing: 0.05em;
  }
  .header-meta span { color: var(--text); }

  /* Week navigator */
  .week-nav {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-bottom: 24px;
  }
  .day-btn {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 4px 12px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    color: var(--text);
    font-family: inherit;
    position: relative;
  }
  .day-btn:hover { border-color: var(--text-mute); }
  .day-btn.active {
    background: var(--bg-card);
    border-color: var(--accent);
  }
  .day-btn .day-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .day-btn .day-type {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    color: var(--text-mute);
  }
  .day-btn.active .day-type { color: var(--text); }
  .day-btn .indicator {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }
  .day-btn[data-type="gym"] .indicator { background: var(--gym); }
  .day-btn[data-type="run"] .indicator { background: var(--run); }
  .day-btn[data-type="long"] .indicator { background: var(--long); }
  .day-btn[data-type="rest"] .indicator { background: var(--rest); opacity: 0.4; }
  .day-btn .completed {
    position: absolute;
    bottom: 4px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: var(--success);
  }

  /* Session header */
  .session-header {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px 24px;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .session-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .session-subtitle {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-top: 4px;
  }
  .session-badge {
    font-family: 'SF Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 5px 10px;
    border-radius: 4px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .badge-gym { background: rgba(74, 143, 0, 0.1); color: var(--accent); }
  .badge-run { background: rgba(29, 111, 235, 0.1); color: var(--run); }
  .badge-long { background: rgba(192, 122, 0, 0.1); color: var(--long); }
  .badge-rest { background: rgba(107, 114, 128, 0.12); color: var(--text-dim); }

  /* Exercise list */
  .exercise-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .exercise-card:hover { border-color: var(--text-mute); }
  .exercise-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 18px;
    cursor: pointer;
  }
  .exercise-number {
    font-family: 'SF Mono', monospace;
    font-size: 11px;
    color: var(--text-mute);
    width: 24px;
    flex-shrink: 0;
  }
  .exercise-icon {
    width: 72px;
    height: 72px;
    background: var(--bg-elevated);
    border-radius: 6px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .exercise-icon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .exercise-icon-fallback {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'SF Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.02em;
    background: linear-gradient(135deg, rgba(74,143,0,0.08), rgba(74,143,0,0.02));
  }
  .exercise-info { flex: 1; min-width: 0; }
  .exercise-name {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .exercise-target {
    font-family: 'SF Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.03em;
  }
  .exercise-status {
    font-size: 11px;
    color: var(--text-mute);
    font-family: 'SF Mono', monospace;
  }
  .exercise-status.done { color: var(--success); }

  /* Exercise body (expanded) */
  .exercise-body {
    border-top: 1px solid var(--border);
    padding: 18px;
    display: none;
    background: #f9f9f7;
  }
  .exercise-card.expanded .exercise-body { display: block; }
  .exercise-detail {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 16px;
    line-height: 1.6;
  }
  
  .sets-grid {
    display: grid;
    grid-template-columns: 40px 1fr 1fr;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }
  .sets-grid.header {
    font-family: 'SF Mono', monospace;
    font-size: 10px;
    color: var(--text-mute);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
  }
  .set-num {
    font-family: 'SF Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
  }
  
  input[type="number"], input[type="text"], textarea {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 10px;
    color: var(--text);
    font-family: 'SF Mono', monospace;
    font-size: 13px;
    width: 100%;
    transition: border-color 0.15s;
  }
  input[type="number"]:focus, input[type="text"]:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
  }

  /* Run inputs */
  .run-form {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }
  .run-field { display: flex; flex-direction: column; gap: 6px; }
  .run-field label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    font-weight: 600;
  }
  .run-field .computed {
    background: var(--bg-elevated);
    padding: 8px 10px;
    border-radius: 4px;
    font-family: 'SF Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    border: 1px solid var(--border);
  }
  .run-field-full { grid-column: span 2; }
  
  /* Pain scale */
  .pain-scale {
    display: grid;
    grid-template-columns: repeat(11, 1fr);
    gap: 4px;
    margin-top: 6px;
  }
  .pain-btn {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 0;
    cursor: pointer;
    color: var(--text);
    font-family: 'SF Mono', monospace;
    font-size: 12px;
    transition: all 0.1s;
  }
  .pain-btn:hover { border-color: var(--text-mute); }
  .pain-btn.active { 
    background: var(--accent); 
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 700;
  }
  .pain-btn.pain-0.active { background: var(--success); border-color: var(--success); }
  .pain-btn.pain-1.active, .pain-btn.pain-2.active, .pain-btn.pain-3.active { 
    background: var(--accent); border-color: var(--accent); 
  }
  .pain-btn.pain-4.active, .pain-btn.pain-5.active, .pain-btn.pain-6.active { 
    background: var(--warn); border-color: var(--warn); color: white;
  }
  .pain-btn.pain-7.active, .pain-btn.pain-8.active, .pain-btn.pain-9.active, .pain-btn.pain-10.active { 
    background: #dc2626; border-color: #dc2626; color: white;
  }

  textarea { resize: vertical; min-height: 60px; font-family: inherit; font-size: 13px; }

  .save-bar {
    position: sticky;
    bottom: 16px;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    margin-top: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.08);
  }
  .save-status {
    font-family: 'SF Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }
  .save-status.saved { color: var(--success); }
  button.primary {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  button.primary:hover { background: var(--accent-dim); }
  button.secondary {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    padding: 8px 16px;
    border-radius: 5px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  button.secondary:hover { color: var(--text); border-color: var(--text-mute); }

  /* Stats panel */
  .stats-section {
    margin-top: 40px;
    padding-top: 28px;
    border-top: 1px solid var(--border);
  }
  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    margin-bottom: 16px;
    font-weight: 600;
  }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
  }
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
  }
  .stat-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 4px;
  }
  .stat-value {
    font-family: 'SF Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }
  .stat-unit {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 400;
    margin-left: 2px;
  }

  /* History */
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 320px;
    overflow-y: auto;
    padding-right: 8px;
  }
  .history-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .history-item:hover { border-color: var(--text-mute); }
  .history-date {
    font-family: 'SF Mono', monospace;
    color: var(--text-dim);
    font-size: 11px;
  }
  .history-type {
    font-weight: 600;
    flex: 1;
    margin-left: 14px;
  }
  .history-stats {
    font-family: 'SF Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }

  /* Rest day */
  .rest-message {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 60px 32px;
    text-align: center;
  }
  .rest-message h2 {
    font-size: 32px;
    margin-bottom: 12px;
    letter-spacing: -0.02em;
  }
  .rest-message p {
    color: var(--text-dim);
    font-size: 14px;
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.6;
  }


  @keyframes blink-green {
    0%, 49%, 100% { opacity: 1; }
    50%, 99% { opacity: 0.4; }
  }

  #syncIndicator.syncing {
    animation: blink-green 0.8s infinite;
  }

  /* Password screen */
  #passwordScreen {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
  }

  #passwordScreen.hidden {
    display: none;
  }

  .password-modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 48px 40px;
    text-align: center;
    max-width: 380px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.12);
  }

  .password-modal h2 {
    font-size: 20px;
    margin-bottom: 12px;
    font-weight: 600;
  }

  .password-modal p {
    color: var(--text-dim);
    margin-bottom: 24px;
    font-size: 14px;
  }

  .password-input-group {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }

  .password-input-group input {
    flex: 1;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', monospace;
  }

  .password-input-group input:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--bg-elevated);
  }

  .password-submit {
    width: 100%;
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 12px 20px;
    border-radius: 6px;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .password-submit:hover {
    background: var(--accent-dim);
  }

  .password-submit:active {
    transform: scale(0.98);
  }

  .password-error {
    color: #dc2626;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }

  .password-error.show {
    display: block;
  }

  @media (max-width: 600px) {
    body { padding: 16px 12px; }
    .day-btn { padding: 8px 2px 10px; }
    .day-btn .day-label { font-size: 9px; }
    .day-btn .day-type { font-size: 8px; }
    .session-title { font-size: 18px; }
    .run-form { grid-template-columns: 1fr; }
    .run-field-full { grid-column: span 1; }
    .pain-scale { gap: 2px; }
    .pain-btn { font-size: 11px; padding: 6px 0; }
    .exercise-icon { width: 56px; height: 56px; }
    .exercise-name { font-size: 13px; }
  }
</style>
</head>
<body>

<div id="passwordScreen">
  <div class="password-modal">
    <h2>🔒 Trainings Log</h2>
    <p>Passwort erforderlich</p>
    <div class="password-input-group">
      <input type="password" id="passwordInput" placeholder="Passwort eingeben" autofocus>
    </div>
    <button class="password-submit" onclick="checkPassword()">Zugriff</button>
    <div class="password-error" id="passwordError">Passwort falsch</div>
  </div>
</div>

<div id="mainContent" style="display:none;">
<div class="container">

  <header class="header">
    <div>
      <h1>Trainings Log</h1>
      <div class="header-meta" id="todayMeta"></div>
    </div>
    <div class="header-meta">
      <span id="syncIndicator" style="margin-right:16px;">☁ Online</span>
      Woche <span id="weekNumber">—</span>
    </div>
  </header>

  <nav class="week-nav" id="weekNav"></nav>

  <div style="display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap;">
    <button class="secondary" onclick="toggleDashboard()" style="font-size:12px;padding:10px 16px;">📊 Dashboard</button>
    <button class="secondary" onclick="toggleStats()" style="font-size:12px;padding:10px 16px;">📈 Statistik</button>
  </div>

  <div id="dashboardSection" style="display:none;margin-bottom:40px;">
    <h2 style="font-size:18px;margin-bottom:20px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.1em;">Dashboard · Fortschritt</h2>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:24px;">
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:20px;">
        <h3 style="font-size:12px;color:var(--text-dim);margin-bottom:16px;text-transform:uppercase;letter-spacing:0.1em;">Lauf-Volumen · pro Woche (km)</h3>
        <canvas id="runVolumeChart" style="max-height:250px;"></canvas>
      </div>
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:20px;">
        <h3 style="font-size:12px;color:var(--text-dim);margin-bottom:16px;text-transform:uppercase;letter-spacing:0.1em;">Durchschnittspace · pro Woche</h3>
        <canvas id="paceChart" style="max-height:250px;"></canvas>
      </div>
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:20px;">
        <h3 style="font-size:12px;color:var(--text-dim);margin-bottom:16px;text-transform:uppercase;letter-spacing:0.1em;">Lauf-Schmerz · Trend</h3>
        <canvas id="painChart" style="max-height:250px;"></canvas>
      </div>
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:20px;">
        <h3 style="font-size:12px;color:var(--text-dim);margin-bottom:16px;text-transform:uppercase;letter-spacing:0.1em;">Gym-Completion · letzte 4 Wochen</h3>
        <canvas id="completionChart" style="max-height:250px;"></canvas>
      </div>
    </div>
  </div>

  <main id="sessionContent"></main>

  <section class="stats-section" id="statsSection">
    <div class="section-title">Statistik · letzte 4 Wochen</div>
    <div class="stats-grid" id="statsGrid"></div>
  </section>

  <section class="stats-section">
    <div class="section-title">Statistik · letzte 4 Wochen</div>
    <div class="stats-grid" id="statsGrid"></div>
  </section>

  <section class="stats-section">
    <div class="section-title">Historie</div>
    <div class="history-list" id="historyList"></div>
  </section>

</div>
</div>

<script>
// ============================================================
// TRAININGSPLAN-DEFINITION
// ============================================================

const WEEK_PLAN = {
  mon: {
    type: 'gym',
    name: 'Schultern & Zug',
    subtitle: '5/3/1-Welle Schulterdrücken · Push + Pull Assistance · Knie-Stabi',
    exercises: [
      { id: 'shoulder_press', name: 'Schulterdrücken Kurzhanteln', target: '5/3/1-Welle · Hauptlift', sets: 4, detail: 'Hauptlift der Einheit. 5/3/1-Schema: W1=5/5/5+ bei 65/75/85% TM, W2=3/3/3+ bei 70/80/90%, W3=5/3/1+ bei 75/85/95%, W4=Deload 40/50/60%. Kurzhanteln auf Schulterhöhe, neutral oder supiniert greifen, sitzend oder stehend. TM-Start: je 15 kg (= 30 kg total). Letzter Satz "+" = AMRAP, Form sauber.' },
      { id: 'hip_thrust', name: 'Hip Thrust Langhantel', target: '3 × 8–10 · 90s Pause', sets: 3, detail: 'Schultern auf Bank, Langhantel über Hüfte. Po aktiv hoch, oben 1 Sek halten. Glute-Aktivierung als Knie-Schutz.' },

function getDateKey(date) {
  return date.toISOString().split('T')[0];
}

function getDayOfWeek(date) {
  const d = date.getDay();
  return DAYS[d === 0 ? 6 : d - 1];
}

function getWeekDates() {
  const today = new Date();
  const todayDay = getDayOfWeek(today);
  const todayIdx = DAYS.indexOf(todayDay);
  const monday = new Date(today);
  monday.setDate(today.getDate() - todayIdx);
  return DAYS.map((_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
}

function loadWorkout(dateKey) {
  try {
    const result = localStorage.getItem(`workout:${dateKey}`);
    const data = result ? JSON.parse(result) : null;

    // Trigger background sync from Supabase (don't wait)
    loadFromSupabase(dateKey);

    return data;
  } catch (e) {
    return null;
  }
}

function saveWorkout(dateKey, data) {
  try {
    localStorage.setItem(`workout:${dateKey}`, JSON.stringify(data));

    // Trigger async sync to Supabase (don't block)
    syncToSupabase(dateKey, data);

    return true;
  } catch (e) {
    console.error('Save failed:', e);
    return false;
  }
}

async function loadFromSupabase(dateKey) {
  try {
    const { data, error } = await supabaseClient
      .from('workouts')
      .select('data')
      .eq('date', dateKey)
      .single();

    if (error) return;
    if (data) {
      localStorage.setItem(`workout:${dateKey}`, JSON.stringify(data.data));
    }
  } catch (e) {
    // Fail silently
  }
}

async function syncToSupabase(dateKey, data) {
  try {
    state.syncStatus = 'syncing';
    await supabaseClient
      .from('workouts')
      .upsert(
        { date: dateKey, data: data },
        { onConflict: 'date' }
      );
    state.syncStatus = 'synced';
  } catch (e) {
    console.log('Supabase sync failed:', e);
    state.syncStatus = 'error';
  }
}

function loadAllWorkouts() {
  try {
    const workouts = [];
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith('workout:')) {
        try {
          const val = localStorage.getItem(key);
          if (val) {
            workouts.push({
              date: key.replace('workout:', ''),
              data: JSON.parse(val)
            });
          }
        } catch (e) { /* skip */ }
      }
    }

    // Trigger async sync of all workouts from Supabase
    syncAllFromSupabase();

    return workouts.sort((a, b) => b.date.localeCompare(a.date));
  } catch (e) {
    return [];
  }
}

async function syncAllFromSupabase() {
  try {
    const { data, error } = await supabaseClient
      .from('workouts')
      .select('date, data');

    if (error) return;
    if (data) {
      data.forEach(wo => {
        localStorage.setItem(`workout:${wo.date}`, JSON.stringify(wo.data));
      });
    }
  } catch (e) {
    // Fail silently
  }
}

function renderHeader() {
  const today = new Date();
  const days = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
  const months = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  const meta = `${days[today.getDay()]} <span>${today.getDate()}. ${months[today.getMonth()]} ${today.getFullYear()}</span>`;
  document.getElementById('todayMeta').innerHTML = meta;
  
  // ISO week number
  const d = new Date(today);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
  const week1 = new Date(d.getFullYear(), 0, 4);
  const wn = 1 + Math.round(((d - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
  document.getElementById('weekNumber').textContent = wn;
}

function renderWeekNav() {
  const dates = getWeekDates();
  const today = new Date();
  const todayKey = getDateKey(today);
  const todayDay = getDayOfWeek(today);

  const nav = document.getElementById('weekNav');
  nav.innerHTML = '';

  for (let i = 0; i < DAYS.length; i++) {
    const dayKey = DAYS[i];
    const date = dates[i];
    const dateKey = getDateKey(date);
    const plan = WEEK_PLAN[dayKey];
    const isToday = dateKey === todayKey;
    const isSelected = dayKey === state.selectedDay;
    const wo = loadWorkout(dateKey);
    const isDone = wo && wo.completed;
    
    const btn = document.createElement('button');
    btn.className = `day-btn ${isSelected ? 'active' : ''}`;
    btn.dataset.day = dayKey;
    btn.dataset.type = plan.type;
    btn.dataset.date = dateKey;
    btn.innerHTML = `
      <div class="indicator"></div>
      <div class="day-label">${DAY_LABELS[dayKey]}${isToday ? ' ·' : ''}</div>
      <div class="day-type">${DAY_TYPE_LABELS[plan.type]}</div>
      ${isDone ? '<div class="completed">✓</div>' : ''}
    `;
    btn.addEventListener('click', () => selectDay(dayKey));
    nav.appendChild(btn);
  }
}

function toggleExercise(headerEl) {
  headerEl.parentElement.classList.toggle('expanded');
}

function bindInputs() {
  document.querySelectorAll('input, textarea').forEach(el => {
    el.addEventListener('input', onInputChange);
    el.addEventListener('blur', collectAndSave);
  });
  document.querySelectorAll('.pain-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.pain-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      onInputChange();
      collectAndSave();
    });
  });
}

function onInputChange() {
  updatePace();
  // Debounced save
  if (state.saveTimer) clearTimeout(state.saveTimer);
  const status = document.getElementById('saveStatus');
  if (status) {
    status.textContent = 'Wird gespeichert...';
    status.classList.remove('saved');
  }
  state.saveTimer = setTimeout(collectAndSave, 800);
}

function parseTime(str) {
  if (!str) return null;
  const parts = str.split(':').map(p => parseInt(p, 10));
  if (parts.some(isNaN)) return null;
  if (parts.length === 2) return parts[0] * 60 + parts[1];
  if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
  return null;
}

function formatPace(secPerKm) {
  if (!secPerKm || !isFinite(secPerKm)) return '—';
  const m = Math.floor(secPerKm / 60);
  const s = Math.round(secPerKm % 60);
  return `${m}:${String(s).padStart(2, '0')} /km`;
}

function updatePace() {
  const distInput = document.querySelector('[data-run="distance"]');
  const timeInput = document.querySelector('[data-run="time"]');
  const pacePanel = document.getElementById('computedPace');
  if (!distInput || !timeInput || !pacePanel) return;
  
  const dist = parseFloat(distInput.value);
  const time = parseTime(timeInput.value);
  if (dist && time) {
    pacePanel.textContent = formatPace(time / dist);
  } else {
    pacePanel.textContent = '—';
  }
}

function collectAndSave() {
  if (!state.todayData) return;
  const plan = WEEK_PLAN[state.selectedDay];
  if (!plan) return;

  if (plan.type === 'gym') {
    const exercises = {};
    plan.exercises.forEach(ex => {
      exercises[ex.id] = { sets: [] };
      for (let i = 0; i < ex.sets; i++) {
        const w = document.querySelector(`[data-ex="${ex.id}"][data-set="${i}"][data-field="weight"]`);
        const r = document.querySelector(`[data-ex="${ex.id}"][data-set="${i}"][data-field="reps"]`);
        exercises[ex.id].sets.push({
          weight: w ? w.value : '',
          reps: r ? r.value : ''
        });
      }
    });
    state.todayData.exercises = exercises;
  } else if (plan.type === 'run' || plan.type === 'long') {
    const run = {};
    document.querySelectorAll('[data-run]').forEach(el => {
      run[el.dataset.run] = el.value;
    });
    const painActive = document.querySelector('.pain-btn.active');
    if (painActive) run.pain = parseInt(painActive.dataset.pain, 10);
    state.todayData.run = run;
  }

  const notes = document.getElementById('sessionNotes');
  if (notes) state.todayData.notes = notes.value;

  const ok = saveWorkout(state.todayData.date, state.todayData);
  const status = document.getElementById('saveStatus');
  if (status) {
    if (ok) {
      const time = new Date().toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit'});
      status.textContent = '✓ Lokal gespeichert · ' + time;
      status.classList.add('saved');
      // Update status in 2s to show sync progress
      setTimeout(() => {
        if (state.syncStatus === 'synced') {
          status.textContent = '☁ Mit Supabase synchronisiert';
        } else if (state.syncStatus === 'syncing') {
          status.textContent = '⟳ Synchronisiere...';
          status.classList.remove('saved');
        }
      }, 2000);
    } else {
      status.textContent = '⚠ Speichern fehlgeschlagen';
    }
  }
  renderWeekNav();
  renderStats();
  renderHistory();
}

function markComplete() {
  collectAndSave();
  if (state.todayData) {
    state.todayData.completed = true;
    state.todayData.completedAt = new Date().toISOString();
    saveWorkout(state.todayData.date, state.todayData);
    renderWeekNav();
    renderStats();
    renderHistory();
    const status = document.getElementById('saveStatus');
    if (status) {
      status.textContent = '✓ Einheit abgeschlossen';
      status.classList.add('saved');
    }
  }
}

function markIncomplete() {
  if (!confirm('Einheit zurücksetzen – Eingaben behalten, nur Häkchen entfernen?')) return;
  if (state.todayData) {
    state.todayData.completed = false;
    delete state.todayData.completedAt;
    saveWorkout(state.todayData.date, state.todayData);
    renderWeekNav();
    renderStats();
    renderHistory();
  }
}

function renderStats() {
  const workouts = loadAllWorkouts();
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 28);
  const cutoffKey = getDateKey(cutoff);
  const recent = workouts.filter(w => w.date >= cutoffKey);
  
  let totalRuns = 0, totalKm = 0, totalGym = 0, totalRest = 0, longRuns = 0;
  let totalPainSum = 0, painCount = 0;
  
  recent.forEach(w => {
    const d = w.data;
    if (!d.completed) return;
    if (d.type === 'run' || d.type === 'long') {
      totalRuns++;
      if (d.type === 'long') longRuns++;
      const dist = parseFloat(d.run?.distance);
      if (!isNaN(dist)) totalKm += dist;
      if (typeof d.run?.pain === 'number') {
        totalPainSum += d.run.pain;
        painCount++;
      }
    } else if (d.type === 'gym') {
      totalGym++;
    } else if (d.type === 'rest') {
      totalRest++;
    }
  });
  
  const avgPain = painCount > 0 ? (totalPainSum / painCount).toFixed(1) : '—';
  
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Gesamt-km</div>
      <div class="stat-value">${totalKm.toFixed(1)}<span class="stat-unit">km</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Läufe</div>
      <div class="stat-value">${totalRuns}<span class="stat-unit">davon ${longRuns} long</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Gym-Einheiten</div>
      <div class="stat-value">${totalGym}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Ø Schmerz</div>
      <div class="stat-value">${avgPain}<span class="stat-unit">/10</span></div>
    </div>
  `;
}

function renderHistory() {
  const workouts = loadAllWorkouts();
  const completed = workouts.filter(w => w.data.completed).slice(0, 15);
  
  const list = document.getElementById('historyList');
  if (completed.length === 0) {
    list.innerHTML = '<div style="color:var(--text-mute);font-size:12px;padding:20px;text-align:center;">Noch keine abgeschlossenen Einheiten. Sobald du eine Einheit markiert, erscheint sie hier.</div>';
    return;
  }
  
  list.innerHTML = completed.map(w => {
    const d = w.data;
    const date = new Date(w.date);
    const dateStr = date.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: '2-digit' });
    const dayKey = getDayOfWeek(date);
    const plan = WEEK_PLAN[dayKey];
    let stats = '';
    if (d.type === 'run' || d.type === 'long') {
      const dist = d.run?.distance ? `${parseFloat(d.run.distance).toFixed(2)} km` : '—';
      const time = d.run?.time || '';
      const hr = d.run?.hr ? `${d.run.hr} bpm` : '';
      stats = [dist, time, hr].filter(Boolean).join(' · ');
    } else if (d.type === 'gym') {
      let totalSets = 0;
      if (d.exercises) {
        Object.values(d.exercises).forEach(ex => {
          (ex.sets || []).forEach(s => { if (s && (s.reps || s.weight)) totalSets++; });
        });
      }
      stats = `${totalSets} Sätze`;
    }
    return `
      <div class="history-item" style="justify-content:space-between;">
        <div style="flex:1;cursor:pointer;" onclick="jumpToDate('${w.date}')">
          <div class="history-date">${dateStr}</div>
          <div class="history-type">${plan ? plan.name : d.type}</div>
          <div class="history-stats">${stats}</div>
        </div>
        <button class="secondary" onclick="deleteWorkoutDate('${w.date}')" style="background:rgba(217,82,14,0.1);color:var(--warn);font-size:10px;padding:6px 10px;margin-left:10px;white-space:nowrap;">🗑 Löschen</button>
      </div>
    `;
  }).join('');
}

function jumpToDate(dateStr) {
  const date = new Date(dateStr);
  const today = new Date();
  const diff = Math.floor((today - date) / 86400000);
  if (diff > 7) {
    alert('Tag liegt mehr als eine Woche zurück. Aktuelle Woche-Navigation zeigt nur diese Woche.');
    return;
  }
  const dayKey = getDayOfWeek(date);
  selectDay(dayKey);
}

// ============================================================
// INIT
// ============================================================

function updateSyncIndicator() {
  const indicator = document.getElementById('syncIndicator');
  if (!indicator) return;

  indicator.classList.remove('syncing');

  if (state.syncStatus === 'synced') {
    indicator.textContent = '🟢 Synchronisiert';
    indicator.style.color = 'var(--success)';
  } else if (state.syncStatus === 'syncing') {
    indicator.textContent = '🟢 Synchronisiere...';
    indicator.style.color = 'var(--success)';
    indicator.classList.add('syncing');
  } else if (state.syncStatus === 'error') {
    indicator.textContent = '🔴 Offline';
    indicator.style.color = 'var(--warn)';
  } else {
    indicator.textContent = '🟢 Online';
    indicator.style.color = 'var(--success)';
  }
}

function toggleDashboard() {
  const dashboard = document.getElementById('dashboardSection');
  const stats = document.getElementById('statsSection');
  if (dashboard.style.display === 'none') {
    dashboard.style.display = 'block';
    stats.style.display = 'none';
    localStorage.setItem('preferredView', 'dashboard');
    renderDashboard();
  } else {
    dashboard.style.display = 'none';
    stats.style.display = 'block';
    localStorage.setItem('preferredView', 'stats');
    renderStats();
  }
}

function toggleStats() {
  const dashboard = document.getElementById('dashboardSection');
  const stats = document.getElementById('statsSection');
  if (stats.style.display === 'none') {
    stats.style.display = 'block';
    dashboard.style.display = 'none';
    localStorage.setItem('preferredView', 'stats');
    renderStats();
  } else {
    stats.style.display = 'none';
    dashboard.style.display = 'block';
    localStorage.setItem('preferredView', 'dashboard');
    renderDashboard();
  }
}

function deleteCurrentWorkout() {
  if (!state.todayData || !confirm('Diesen Eintrag wirklich löschen?')) return;
  deleteWorkoutDate(state.todayData.date);
}

function deleteWorkoutDate(dateKey) {
  if (!confirm('Eintrag vom ' + dateKey + ' löschen? Das kann nicht rückgängig gemacht werden.')) return;
  try {
    localStorage.removeItem(`workout:${dateKey}`);
    syncDeleteToSupabase(dateKey);
    renderWeekNav();
    renderStats();
    renderHistory();
    alert('Eintrag gelöscht');
  } catch (e) {
    alert('Fehler beim Löschen');
  }
}

async function syncDeleteToSupabase(dateKey) {
  try {
    await supabaseClient
      .from('workouts')
      .delete()
      .eq('date', dateKey);
  } catch (e) {
    console.log('Supabase delete failed:', e);
  }
}

function renderDashboard() {
  if (typeof Chart === 'undefined') {
    setTimeout(renderDashboard, 200);
    return;
  }

  try {
    const workouts = loadAllWorkouts();
    const today = new Date();
    const todayKey = getDateKey(today);

    const todayData = loadWorkout(todayKey);
    if (todayData && !workouts.find(w => w.date === todayKey)) {
      workouts.push({ date: todayKey, data: todayData });
    }

    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - 28);
    const cutoffKey = getDateKey(cutoff);
    const recent = workouts.filter(w => w.date >= cutoffKey && w.data);

    const weeklyRuns = {};
    const weeklyPace = {};
    const weeklyPain = {};

    recent.forEach(w => {
      if (!w.data || !w.data.type) return;
      const date = new Date(w.date);
      const ws = new Date(date);
      ws.setDate(date.getDate() - ((date.getDay() + 6) % 7));
      const weekKey = getDateKey(ws);

      if (w.data.type === 'run' || w.data.type === 'long') {
        if (!weeklyRuns[weekKey]) weeklyRuns[weekKey] = 0;
        if (!weeklyPace[weekKey]) weeklyPace[weekKey] = [];
        if (!weeklyPain[weekKey]) weeklyPain[weekKey] = [];

        const dist = parseFloat(w.data.run && w.data.run.distance);
        if (!isNaN(dist) && dist > 0) weeklyRuns[weekKey] += dist;

        const time = parseTime(w.data.run && w.data.run.time);
        if (dist > 0 && time > 0) weeklyPace[weekKey].push(time / dist);

        const pain = w.data.run && w.data.run.pain;
        if (typeof pain === 'number') weeklyPain[weekKey].push(pain);
      }
    });

    const weeks = Object.keys(weeklyRuns).sort().slice(-4);
    const volumeData = weeks.map(w => weeklyRuns[w] || 0);
    const paceData = weeks.map(w => {
      const arr = weeklyPace[w];
      return arr && arr.length > 0 ? arr.reduce((a,b)=>a+b) / arr.length : 0;
    });
    const painData = weeks.map(w => {
      const arr = weeklyPain[w];
      return arr && arr.length > 0 ? arr.reduce((a,b)=>a+b) / arr.length : 0;
    });
    const weekLabels = weeks.map(w => {
      const d = new Date(w);
      return d.toLocaleDateString('de-DE', {month:'short', day:'numeric'});
    });

    const noRunData = weeks.length === 0;
    const emptyLabel = noRunData ? ['Noch keine Daten'] : weekLabels;
    const emptyData = noRunData ? [0] : null;

    const weekStart = new Date();
    weekStart.setDate(weekStart.getDate() - ((weekStart.getDay() + 6) % 7));
    weekStart.setHours(0,0,0,0);

    const thisWeekWorkouts = workouts.filter(w => {
      if (!w.data) return false;
      const date = new Date(w.date);
      return date >= weekStart;
    });

    const totalSessionsThisWeek = thisWeekWorkouts.length;
    const completedThisWeek = thisWeekWorkouts.filter(w => w.data && w.data.completed).length;
    const plannedSessions = 6;

    renderChart('runVolumeChart', 'bar', {
      labels: noRunData ? emptyLabel : weekLabels,
      datasets: [{
        label: 'km pro Woche',
        data: noRunData ? emptyData : volumeData,
        backgroundColor: 'rgba(74, 143, 0, 0.6)',
        borderColor: 'rgba(74, 143, 0, 1)',
        borderWidth: 2
      }]
    }, { scales: { y: { beginAtZero: true } } });

    renderChart('paceChart', 'line', {
      labels: noRunData ? emptyLabel : weekLabels,
      datasets: [{
        label: 'Ø Pace (min/km)',
        data: noRunData ? emptyData : paceData.map(p => p > 0 ? +(p/60).toFixed(2) : 0),
        borderColor: 'rgba(29, 111, 235, 1)',
        backgroundColor: 'rgba(29, 111, 235, 0.1)',
        borderWidth: 2,
        tension: 0.3,
        fill: true
      }]
    }, { scales: { y: { beginAtZero: false } } });

    renderChart('painChart', 'line', {
      labels: noRunData ? emptyLabel : weekLabels,
      datasets: [{
        label: 'Ø Schmerz-Level',
        data: noRunData ? emptyData : painData,
        borderColor: 'rgba(217, 82, 14, 1)',
        backgroundColor: 'rgba(217, 82, 14, 0.1)',
        borderWidth: 2,
        tension: 0.3,
        fill: true
      }]
    }, { scales: { y: { min: 0, max: 10 } } });

    renderChart('completionChart', 'doughnut', {
      labels: ['Abgeschlossen', 'Offen', 'Geplant'],
      datasets: [{
        data: [
          completedThisWeek,
          Math.max(0, totalSessionsThisWeek - completedThisWeek),
          Math.max(0, plannedSessions - totalSessionsThisWeek)
        ],
        backgroundColor: [
          'rgba(21, 128, 61, 0.6)',
          'rgba(74, 143, 0, 0.3)',
          'rgba(107, 114, 128, 0.15)'
        ],
        borderColor: [
          'rgba(21, 128, 61, 1)',
          'rgba(74, 143, 0, 0.6)',
          'rgba(107, 114, 128, 0.3)'
        ],
        borderWidth: 2
      }]
    }, { plugins: { legend: { position: 'bottom' } } });

  } catch (e) {
    console.error('Dashboard render error:', e);
  }
}

function renderChart(canvasId, type, data, options) {
  try {
    const canvas = document.getElementById(canvasId);
    if (!canvas || typeof Chart === 'undefined') return;

    if (!window.chartInstances) window.chartInstances = {};
    if (window.chartInstances[canvasId]) {
      window.chartInstances[canvasId].destroy();
    }

    window.chartInstances[canvasId] = new Chart(canvas, {
      type: type,
      data: data,
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: { labels: { color: '#666', font: { size: 11 } } }
        },
        ...(options || {})
      }
    });
  } catch (e) {
    console.error('Chart render error (' + canvasId + '):', e);
  }
}

// ============================================================
// PASSWORD PROTECTION
// ============================================================

const CORRECT_PASSWORD = '6845d4n13l';

function checkPassword() {
  const input = document.getElementById('passwordInput');
  const password = input.value;
  const errorEl = document.getElementById('passwordError');

  if (password === CORRECT_PASSWORD) {
    errorEl.classList.remove('show');
    localStorage.setItem('gymLogAuth', 'true');
    unlockApp();
  } else {
    errorEl.classList.add('show');
    input.value = '';
    input.focus();
  }
}

function unlockApp() {
  document.getElementById('passwordScreen').classList.add('hidden');
  document.getElementById('mainContent').style.display = 'block';
  window.dispatchEvent(new Event('gymLogUnlocked'));
}

function initializeAuthScreen() {
  const isAuthed = localStorage.getItem('gymLogAuth') === 'true';

  if (isAuthed) {
    unlockApp();
  } else {
    document.getElementById('passwordInput').focus();
  }

  // Allow Enter key to submit password
  document.getElementById('passwordInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') checkPassword();
  });
}

function init() {
  renderHeader();
  state.selectedDay = getDayOfWeek(new Date());
  renderWeekNav();
  renderSession();
  renderHistory();

  const preferredView = localStorage.getItem('preferredView') || 'dashboard';
  const dashboardSection = document.getElementById('dashboardSection');
  const statsSection = document.getElementById('statsSection');

  if (preferredView === 'stats') {
    dashboardSection.style.display = 'none';
    statsSection.style.display = 'block';
    renderStats();
  } else {
    dashboardSection.style.display = 'block';
    statsSection.style.display = 'none';
    // Delay dashboard render to ensure Chart.js is loaded and canvas is visible
    setTimeout(renderDashboard, 100);
  }

  syncAllFromSupabase();
  setInterval(updateSyncIndicator, 500);
}

window.toggleExercise = toggleExercise;
window.markComplete = markComplete;
window.markIncomplete = markIncomplete;
window.jumpToDate = jumpToDate;
window.toggleDashboard = toggleDashboard;
window.toggleStats = toggleStats;
window.deleteCurrentWorkout = deleteCurrentWorkout;
window.deleteWorkoutDate = deleteWorkoutDate;
window.checkPassword = checkPassword;

function handleDOMReady() {
  window.addEventListener('gymLogUnlocked', init);
  initializeAuthScreen();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', handleDOMReady);
} else {
  handleDOMReady();
}
</script>
