<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trainings Log</title>

<!-- iOS Home Screen Icon -->
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="16x16" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Gym Log">

<!-- External Dependencies -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1/dist/cropper.min.css">
<script src="https://cdn.jsdelivr.net/npm/cropperjs@1/dist/cropper.min.js"></script>

<!-- Modular CSS -->
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body>

<div id="passwordScreen">
  <div class="password-modal">
    <h2>🔒 Trainings Log</h2>
    <p>Passwort erforderlich</p>
    <div class="password-input-group">
      <input type="password" id="passwordInput" placeholder="Passwort eingeben" autofocus>
    </div>
    <button class="password-submit" onclick="checkPassword()">Zugriff</button>
    <div class="password-error" id="passwordError">Passwort falsch</div>
  </div>
</div>

<div id="mainContent" style="display:none;">
<div class="container">

  <header class="header">
    <div class="header-left">
      <img class="header-avatar" id="headerAvatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23999' stroke-width='1.5'%3E%3Ccircle cx='12' cy='8' r='4'/%3E%3Cpath d='M6 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2'/%3E%3C/svg%3E" alt="Avatar" onclick="changeAvatar()">
      <div class="header-info">
        <h1 id="userTitle" onclick="openTitleEditor()" style="cursor:pointer;transition:opacity 0.2s;" onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='1'">Daniel Mau</h1>
        <div class="header-status" id="syncStatus">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M5 12.55a11 11 0 0 1 14.08 0"></path>
            <path d="M1.42 9a16 16 0 0 1 21.16 0"></path>
            <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
            <circle cx="12" cy="20" r="1" fill="currentColor"></circle>
          </svg>
          Synchronisiert
        </div>
      </div>
    </div>
    <div class="theme-circle" onclick="toggleTheme()" id="themeCircle">
      <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:20px;height:20px;">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </div>
    <div class="header-meta" id="todayMeta" style="display:none;"></div>
  </header>

  <div class="week-nav-card">
    <div class="week-nav-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;flex-shrink:0;">
        <rect x="3" y="4" width="18" height="18" rx="3" ry="3"></rect>
        <line x1="16" y1="2" x2="16" y2="6"></line>
        <line x1="8" y1="2" x2="8" y2="6"></line>
        <line x1="3" y1="10" x2="21" y2="10"></line>
      </svg>
      <span id="weekNavTitle">—</span>
      <div style="display:flex;gap:6px;margin-left:auto;">
        <button onclick="changeWeek(-1)" style="background:var(--surface-overlay);border:1px solid var(--surface-input-border);border-radius:50%;width:28px;height:28px;padding:0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--accent);transition:opacity 0.15s;" onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='1'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;"><polyline points="15 18 9 12 15 6"/></svg></button>
        <button onclick="changeWeek(1)" style="background:var(--surface-overlay);border:1px solid var(--surface-input-border);border-radius:50%;width:28px;height:28px;padding:0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--accent);transition:opacity 0.15s;" onmouseover="this.style.opacity='0.7'" onmouseout="this.style.opacity='1'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
    </div>
    <nav class="week-nav" id="weekNav"></nav>
  </div>

  <div class="body-metrics" id="bodyMetricsSection">
    <div class="body-metrics-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
      </svg>
      Körperdaten · heute
    </div>

    <div class="body-metrics-grid">
      <div class="body-metric-inputs">
        <div>
          <label>Gewicht (kg)</label>
          <input type="number" step="0.1" id="bodyWeight" placeholder="—" inputmode="decimal" oninput="saveBodyMetrics()">
        </div>
        <div>
          <label>Ziel</label>
          <input type="number" step="0.1" id="targetWeight" placeholder="—" inputmode="decimal" oninput="saveBodyTargets()" class="target-input">
        </div>
      </div>
      <div class="body-metric-inputs">
        <div>
          <label>KFA (%)</label>
          <input type="number" step="0.1" id="bodyFat" placeholder="—" inputmode="decimal" oninput="saveBodyMetrics()">
        </div>
        <div>
          <label>Ziel</label>
          <input type="number" step="0.1" id="targetFat" placeholder="—" inputmode="decimal" oninput="saveBodyTargets()" class="target-input">
        </div>
      </div>
    </div>

    <div class="body-metrics-grid">
      <div class="body-metric-chart" id="weightSparkline"></div>
      <div class="body-metric-chart" id="fatSparkline"></div>
    </div>
  </div>

  <main id="sessionContent"></main>

  <section class="stats-section" id="statsSection" style="margin-top: 20px;">
    <div class="stats-outer-card">
      <div class="body-metrics-title" style="margin-bottom:8px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        Statistik · letzte 6 Wochen
      </div>
      <div class="stats-grid" id="statsGrid"></div>
      <div class="chart-grid" id="chartCarousel" style="margin-top:0;">
        <div id="runVolumeSparkline"></div>
        <div id="paceSparkline"></div>
        <div id="cadenceSparkline"></div>
        <div id="painSparkline"></div>
        <div id="weightStatSparkline"></div>
        <div id="fatStatSparkline"></div>
      </div>
      <div class="chart-dots" id="chartDots">
        <span class="chart-dot active"></span>
        <span class="chart-dot"></span>
        <span class="chart-dot"></span>
        <span class="chart-dot"></span>
        <span class="chart-dot"></span>
        <span class="chart-dot"></span>
      </div>
    </div>
  </section>

  <section class="stats-section">
    <div class="history-card">
      <div class="history-card-title">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 5.67541V3C3 2.44772 2.55228 2 2 2C1.44772 2 1 2.44772 1 3V7C1 8.10457 1.89543 9 3 9H7C7.55229 9 8 8.55229 8 8C8 7.44772 7.55229 7 7 7H4.52186C4.54218 6.97505 4.56157 6.94914 4.57995 6.92229C5.621 5.40094 7.11009 4.22911 8.85191 3.57803C10.9074 2.80968 13.173 2.8196 15.2217 3.6059C17.2704 4.3922 18.9608 5.90061 19.9745 7.8469C20.9881 9.79319 21.2549 12.043 20.7247 14.1724C20.1945 16.3018 18.9039 18.1638 17.0959 19.4075C15.288 20.6513 13.0876 21.1909 10.9094 20.9247C8.73119 20.6586 6.72551 19.605 5.27028 17.9625C4.03713 16.5706 3.27139 14.8374 3.06527 13.0055C3.00352 12.4566 2.55674 12.0079 2.00446 12.0084C1.45217 12.0088 0.995668 12.4579 1.04626 13.0078C1.25994 15.3309 2.2082 17.5356 3.76666 19.2946C5.54703 21.3041 8.00084 22.5931 10.6657 22.9188C13.3306 23.2444 16.0226 22.5842 18.2345 21.0626C20.4464 19.541 22.0254 17.263 22.6741 14.6578C23.3228 12.0526 22.9963 9.30013 21.7562 6.91897C20.5161 4.53782 18.448 2.69239 15.9415 1.73041C13.4351 0.768419 10.6633 0.756291 8.14853 1.69631C6.06062 2.47676 4.26953 3.86881 3 5.67541Z"/>
          <path d="M12 5C11.4477 5 11 5.44771 11 6V12.4667C11 12.4667 11 12.7274 11.1267 12.9235C11.2115 13.0898 11.3437 13.2344 11.5174 13.3346L16.1372 16.0019C16.6155 16.278 17.2271 16.1141 17.5032 15.6358C17.7793 15.1575 17.6155 14.546 17.1372 14.2698L13 11.8812V6C13 5.44772 12.5523 5 12 5Z"/>
        </svg>
        Historie
      </div>
      <div id="calendarSection"></div>
    </div>
  </section>

  <div class="calendar-modal" id="calendarModal">
    <div class="calendar-modal-content" style="position:relative;">
      <button class="calendar-modal-close" onclick="closeCalendarModal()">✕</button>
      <div id="calendarModalContent"></div>
    </div>
  </div>

  <div class="calendar-modal" id="titleEditorModal" onclick="if(event.target===this)closeTitleEditor()">
    <div class="calendar-modal-content">
      <button class="calendar-modal-close" onclick="closeTitleEditor()">✕</button>
      <div style="padding:20px;">
        <div class="calendar-modal-title">Begrüßung ändern</div>
        <input type="text" id="titleInput" placeholder="Name eingeben..." style="width:100%;padding:8px 12px;margin-top:12px;border:1px solid var(--surface-input-border);border-radius:8px;font-size:16px;font-family:inherit;background:var(--bg-input);color:var(--text);">
        <button onclick="saveTitleEditor()" style="width:100%;padding:10px;margin-top:12px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;">Speichern</button>
      </div>
    </div>
  </div>

  <div class="week-picker-overlay" id="weekPickerOverlay" onclick="if(event.target===this)closeWeekPicker()">
    <div class="week-picker-sheet" id="weekPickerSheet">
      <div class="week-picker-handle"></div>
      <div class="week-picker-header">
        <span class="week-picker-title">Woche auswählen</span>
        <button class="week-picker-done" onclick="closeWeekPicker()">Fertig</button>
      </div>
      <div class="week-picker-list" id="weekPickerList"></div>
      <button class="week-picker-today" onclick="goToWeekOffset(0)">Zurück zur aktuellen Woche</button>
    </div>
  </div>

</div>
</div>

<!-- Cropper Modal -->
<div id="cropperModal">
  <div class="cropper-container-inner">
    <img id="cropperImage" src="" alt="Crop">
    <button class="cropper-save-btn" onclick="saveCroppedAvatar()">Speichern</button>
  </div>
</div>

<!-- Upload Password Modal -->
<div id="uploadPwModal">
  <div class="upload-pw-box">
    <h3>Passwort eingeben</h3>
    <input type="password" id="uploadPwInput" placeholder="Passwort">
    <div class="btn-row">
      <button class="btn-cancel" onclick="cancelUploadPw()">Abbrechen</button>
      <button class="btn-confirm" onclick="confirmUploadPw()">Bestätigen</button>
    </div>
  </div>
</div>

<!-- Modular JavaScript -->
<script src="js/auth.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/app.js"></script>

</body>
</html>
